## ============================================
## PROMETHEUS
## ============================================
apiVersion: v1
kind: ConfigMap
metadata:
  name: prometheus-config
  namespace: carwash
data:
  prometheus.yml: |
    global:
      scrape_interval: 15s
      evaluation_interval: 15s
    scrape_configs:
      - job_name: 'prometheus'
        static_configs:
          - targets: ['localhost:9090']
      - job_name: 'api-gateway'
        metrics_path: '/actuator/prometheus'
        static_configs:
          - targets: ['api-gateway:8080']
            labels:
              application: 'API-GATEWAY'
      - job_name: 'user-service'
        metrics_path: '/actuator/prometheus'
        static_configs:
          - targets: ['user-service:8081']
            labels:
              application: 'USER-SERVICE'
      - job_name: 'car-service'
        metrics_path: '/actuator/prometheus'
        static_configs:
          - targets: ['car-service:8082']
            labels:
              application: 'CAR-SERVICE'
      - job_name: 'order-service'
        metrics_path: '/actuator/prometheus'
        static_configs:
          - targets: ['order-service:8083']
            labels:
              application: 'ORDER-SERVICE'
      - job_name: 'payment-service'
        metrics_path: '/actuator/prometheus'
        static_configs:
          - targets: ['payment-service:8084']
            labels:
              application: 'PAYMENT-SERVICE'
      - job_name: 'rating-service'
        metrics_path: '/actuator/prometheus'
        static_configs:
          - targets: ['rating-service:8086']
            labels:
              application: 'RATING-SERVICE'
      - job_name: 'invoice-service'
        metrics_path: '/actuator/prometheus'
        static_configs:
          - targets: ['invoice-service:8087']
            labels:
              application: 'INVOICE-SERVICE'
      - job_name: 'admin-service'
        metrics_path: '/actuator/prometheus'
        static_configs:
          - targets: ['admin-service:8088']
            labels:
              application: 'ADMIN-SERVICE'
      - job_name: 'notification-service'
        metrics_path: '/actuator/prometheus'
        static_configs:
          - targets: ['notification-service:8089']
            labels:
              application: 'NOTIFICATION-SERVICE'
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: prometheus
  namespace: carwash
spec:
  replicas: 1
  selector:
    matchLabels:
      app: prometheus
  template:
    metadata:
      labels:
        app: prometheus
    spec:
      containers:
        - name: prometheus
          image: prom/prometheus:latest
          ports:
            - containerPort: 9090
          volumeMounts:
            - name: prometheus-config
              mountPath: /etc/prometheus/prometheus.yml
              subPath: prometheus.yml
          resources:
            requests:
              memory: "256Mi"
              cpu: "200m"
            limits:
              memory: "512Mi"
              cpu: "400m"
      volumes:
        - name: prometheus-config
          configMap:
            name: prometheus-config
---
apiVersion: v1
kind: Service
metadata:
  name: prometheus
  namespace: carwash
spec:
  selector:
    app: prometheus
  ports:
    - port: 9090
      targetPort: 9090

---
## ============================================
## GRAFANA
## ============================================
apiVersion: apps/v1
kind: Deployment
metadata:
  name: grafana
  namespace: carwash
spec:
  replicas: 1
  selector:
    matchLabels:
      app: grafana
  template:
    metadata:
      labels:
        app: grafana
    spec:
      containers:
        - name: grafana
          image: grafana/grafana:latest
          ports:
            - containerPort: 3000
          env:
            - name: GF_SECURITY_ADMIN_USER
              value: "admin"
            - name: GF_SECURITY_ADMIN_PASSWORD
              value: "admin"
          resources:
            requests:
              memory: "256Mi"
              cpu: "200m"
            limits:
              memory: "512Mi"
              cpu: "400m"
---
apiVersion: v1
kind: Service
metadata:
  name: grafana
  namespace: carwash
spec:
  type: NodePort
  selector:
    app: grafana
  ports:
    - port: 3000
      targetPort: 3000
      nodePort: 30300
